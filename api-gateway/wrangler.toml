name = "minicrm-api-gateway"
main = "src/index.ts"
workers_dev = true
compatibility_date = "2025-01-01"

[vars]
FRONTEND_URL = "http://localhost:5173"
AUTH_SERVICE_URL = "http://127.0.0.1:8082"
N8N_WEBHOOK_URL = "http://127.0.0.1:5678/webhook"


[env.production]
name = "minicrm-api-gateway"
vars = { FRONTEND_URL = "https://minicrm-teste-nutek.pages.dev", AUTH_SERVICE_URL = "https://minicrm-teste-nutek-production.up.railway.app", N8N_WEBHOOK_URL = "https://n8n-production-2160.up.railway.app/webhook" }

[observability]
enabled = true
